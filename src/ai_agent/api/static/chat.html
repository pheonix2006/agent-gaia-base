<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent - 聊天助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            margin: 0;
            padding: 0;
        }
        .header {
            background: #16213e;
            padding: 15px 20px;
            border-bottom: 1px solid #0f3460;
        }
        .header h1 {
            font-size: 18px;
            color: #e94560;
        }
        .header span {
            font-size: 12px;
            color: #888;
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .message {
            margin-bottom: 15px;
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user { justify-content: flex-end; }
        .message.assistant { justify-content: flex-start; }
        .bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
        }
        .message.user .bubble {
            background: #e94560;
            color: #fff;
        }
        .message.assistant .bubble {
            background: #0f3460;
            color: #eee;
        }
        .input-area {
            background: #16213e;
            padding: 15px 20px;
            border-top: 1px solid #0f3460;
            display: flex;
            gap: 10px;
        }
        #messageInput {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #0f3460;
            border-radius: 8px;
            background: #1a1a2e;
            color: #eee;
            font-size: 14px;
            outline: none;
        }
        #messageInput:focus { border-color: #e94560; }
        #sendBtn {
            padding: 12px 24px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        #sendBtn:disabled { background: #555; cursor: not-allowed; }
        .loading {
            display: none;
            color: #888;
            font-size: 12px;
            line-height: 40px;
        }
        .loading.show { display: block; }
        .welcome {
            text-align: center;
            color: #888;
            margin-top: 50px;
        }

        /* 折叠卡片样式 */
        .steps-container {
            max-width: 70%;
            margin-bottom: 15px;
        }
        .step-card {
            background: #0f3460;
            border-radius: 8px;
            margin-bottom: 8px;
            overflow: hidden;
            animation: fadeIn 0.3s ease;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .step-card:hover {
            background: #0f3a70;
        }
        .step-header {
            display: flex;
            align-items: center;
            padding: 10px 14px;
            gap: 8px;
        }
        .step-icon {
            font-size: 16px;
        }
        .step-title {
            flex: 1;
            font-size: 14px;
            color: #eee;
        }
        .step-expand {
            font-size: 12px;
            color: #888;
            transition: transform 0.2s ease;
        }
        .step-card.expanded .step-expand {
            transform: rotate(180deg);
        }
        .step-detail {
            display: none;
            padding: 0 14px 14px 14px;
            border-top: 1px solid #1a4a80;
        }
        .step-card.expanded .step-detail {
            display: block;
        }
        .step-detail pre {
            background: #1a1a2e;
            padding: 10px;
            border-radius: 6px;
            font-size: 12px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
            color: #ccc;
            margin: 0;
        }
        .step-detail .detail-label {
            font-size: 11px;
            color: #888;
            margin-bottom: 4px;
            text-transform: uppercase;
        }
        .step-detail .detail-section {
            margin-top: 10px;
        }
        .step-detail .detail-section:first-child {
            margin-top: 0;
        }

        /* 事件类型颜色 */
        .step-card.think { border-left: 3px solid #9b59b6; }
        .step-card.act { border-left: 3px solid #3498db; }
        .step-card.observe { border-left: 3px solid #2ecc71; }
        .step-card.error { border-left: 3px solid #e74c3c; }
        .step-card.finish { border-left: 3px solid #f1c40f; }

        /* 停止按钮样式 */
        #stopBtn {
            padding: 12px 20px;
            background: #e74c3c;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            display: none;
        }
        #stopBtn:hover { background: #c0392b; }
        #stopBtn.show { display: block; }

        /* 主容器布局 */
        .main-container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 侧边栏 */
        .sidebar {
            width: 280px;
            background: #16213e;
            border-right: 1px solid #0f3460;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 15px 20px;
            border-bottom: 1px solid #0f3460;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h2 {
            font-size: 16px;
            color: #e94560;
            margin: 0;
        }

        .project-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .project-item {
            margin-bottom: 5px;
        }

        .project-header {
            padding: 10px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .project-header:hover {
            background: #0f3460;
        }

        .project-header.active {
            background: #0f3460;
            border-left: 3px solid #e94560;
        }

        .project-name {
            font-size: 14px;
            color: #eee;
        }

        .project-expand {
            font-size: 12px;
            color: #888;
        }

        .session-list {
            display: none;
            background: #0a0f1e;
            padding: 5px 0;
        }

        .project-item.expanded .session-list {
            display: block;
        }

        .session-item {
            padding: 8px 30px;
            cursor: pointer;
            font-size: 13px;
            color: #ccc;
        }

        .session-item:hover {
            background: #16213e;
        }

        .session-item.active {
            background: #1a3a5c;
            color: #fff;
        }

        .btn-icon {
            width: 28px;
            height: 28px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-secondary {
            width: 100%;
            padding: 10px;
            background: #0f3460;
            color: #eee;
            border: 1px solid #1a4a80;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .sidebar-footer {
            padding: 15px 20px;
            border-top: 1px solid #0f3460;
        }

        /* 聊天包装器 */
        .chat-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        /* 权限对话框 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #16213e;
            padding: 30px;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .modal-content h3 {
            color: #e94560;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .modal-content p {
            color: #ccc;
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-actions .btn-primary {
            padding: 10px 20px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .modal-actions .btn-primary:hover {
            background: #d63050;
        }

        .modal-actions .btn-secondary {
            padding: 10px 20px;
            background: #0f3460;
            color: #eee;
            border: 1px solid #1a4a80;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            width: auto;
        }

        .modal-actions .btn-secondary:hover {
            background: #1a4a80;
        }
    </style>
</head>
<body>
    <!-- 权限请求对话框 -->
    <div class="modal" id="permissionModal">
        <div class="modal-content">
            <h3>⚠️ 权限请求</h3>
            <p id="permissionMessage"></p>
            <div class="modal-actions">
                <button id="permissionAllowOnce" class="btn-primary">允许一次</button>
                <button id="permissionDeny" class="btn-secondary">拒绝</button>
            </div>
        </div>
    </div>

    <div class="main-container">
        <!-- 新增：侧边栏 -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>项目</h2>
                <button id="createProjectBtn" class="btn-icon" title="新建项目">+</button>
            </div>

            <div class="project-list" id="projectList">
                <!-- 项目列表将通过 JS 动态渲染 -->
            </div>

            <div class="sidebar-footer">
                <button id="settingsBtn" class="btn-secondary">设置</button>
            </div>
        </div>

        <!-- 原有的聊天界面容器 -->
        <div class="chat-wrapper">
            <div class="header">
                <h1>🤖 AI Agent</h1>
                <span>基于 LangGraph + DeepSeek</span>
            </div>

            <div class="chat-container" id="chatContainer">
                <div class="welcome" id="welcome">
                    <p>👋 你好！我是 AI 助手</p>
                    <p>在下方输入消息开始对话</p>
                </div>
            </div>

            <div class="input-area">
                <input type="text" id="messageInput" placeholder="输入消息..." autofocus>
                <button id="sendBtn">发送</button>
                <button id="stopBtn">停止</button>
                <span class="loading" id="loading">AI 思考中...</span>
            </div>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const stopBtn = document.getElementById('stopBtn');
        const loading = document.getElementById('loading');
        const welcome = document.getElementById('welcome');

        // 流式请求控制
        let abortController = null;
        let isStreaming = false;

        // 当前消息的步骤容器
        let currentStepsContainer = null;

        function hideWelcome() {
            if (welcome) welcome.style.display = 'none';
        }

        function addMessage(content, isUser) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'assistant'}`;
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = content;
            messageDiv.appendChild(bubble);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return messageDiv;
        }

        // 创建步骤容器
        function createStepsContainer() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant';
            currentStepsContainer = document.createElement('div');
            currentStepsContainer.className = 'steps-container';
            messageDiv.appendChild(currentStepsContainer);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return currentStepsContainer;
        }

        // 折叠/展开切换
        function toggleExpand(card) {
            card.classList.toggle('expanded');
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 事件类型配置
        const eventConfig = {
            think: { icon: '🤔', title: '思考中...', class: 'think' },
            act: { icon: '🔧', title: '调用工具', class: 'act' },
            observe: { icon: '📥', title: '获取结果', class: 'observe' },
            error: { icon: '❌', title: '出错了', class: 'error' },
            finish: { icon: '✅', title: '完成', class: 'finish' }
        };

        // 渲染事件
        // 事件格式: { event: 'think'|'act'|'observe'|'error'|'finish', data: {...}, timestamp: '...', step: 1 }
        function renderEvent(event) {
            // 检查权限错误
            if (checkPermissionError(event)) {
                return;
            }

            if (!currentStepsContainer) {
                createStepsContainer();
            }

            // 提取事件类型和数据
            const eventType = event.event || 'think';
            const eventData = event.data || {};
            const step = event.step || 0;

            const config = eventConfig[eventType] || eventConfig.think;

            // 创建步骤卡片
            const card = document.createElement('div');
            card.className = `step-card ${config.class}`;
            card.onclick = () => toggleExpand(card);

            // 构建标题
            let title = config.title;
            if (eventType === 'act' && eventData.tool_name) {
                title = `调用 ${escapeHtml(eventData.tool_name)}`;
            } else if (eventType === 'observe' && eventData.tool_name) {
                title = `获取 ${escapeHtml(eventData.tool_name)} 结果`;
            } else if (eventType === 'error' && eventData.message) {
                title = `错误: ${escapeHtml(eventData.message.substring(0, 30))}${eventData.message.length > 30 ? '...' : ''}`;
            }

            // 构建头部
            const header = document.createElement('div');
            header.className = 'step-header';
            header.innerHTML = `
                <span class="step-icon">${config.icon}</span>
                <span class="step-title">${title}</span>
                <span class="step-expand">▼</span>
            `;
            card.appendChild(header);

            // 构建详情
            const detail = document.createElement('div');
            detail.className = 'step-detail';

            // 根据事件类型渲染不同内容
            let detailContent = '';

            // 添加步骤和时间戳信息
            if (step > 0 || event.timestamp) {
                detailContent += `
                    <div class="detail-section">
                        <div class="detail-label">元信息</div>
                        <pre>步骤: ${step}${event.timestamp ? ` | 时间: ${event.timestamp}` : ''}</pre>
                    </div>
                `;
            }

            switch (eventType) {
                case 'think':
                    if (eventData.reasoning) {
                        detailContent += `
                            <div class="detail-section">
                                <div class="detail-label">推理过程</div>
                                <pre>${escapeHtml(eventData.reasoning)}</pre>
                            </div>
                        `;
                    }
                    if (eventData.raw_output) {
                        detailContent += `
                            <div class="detail-section">
                                <div class="detail-label">原始输出</div>
                                <pre>${escapeHtml(eventData.raw_output)}</pre>
                            </div>
                        `;
                    }
                    break;

                case 'act':
                    if (eventData.tool_name) {
                        detailContent += `
                            <div class="detail-section">
                                <div class="detail-label">工具名称</div>
                                <pre>${escapeHtml(eventData.tool_name)}</pre>
                            </div>
                        `;
                    }
                    if (eventData.params) {
                        detailContent += `
                            <div class="detail-section">
                                <div class="detail-label">参数</div>
                                <pre>${escapeHtml(typeof eventData.params === 'string' ? eventData.params : JSON.stringify(eventData.params, null, 2))}</pre>
                            </div>
                        `;
                    }
                    break;

                case 'observe':
                    if (eventData.tool_name) {
                        detailContent += `
                            <div class="detail-section">
                                <div class="detail-label">工具名称</div>
                                <pre>${escapeHtml(eventData.tool_name)}</pre>
                            </div>
                        `;
                    }
                    if (eventData.result_summary) {
                        detailContent += `
                            <div class="detail-section">
                                <div class="detail-label">结果摘要</div>
                                <pre>${escapeHtml(eventData.result_summary)}</pre>
                            </div>
                        `;
                    }
                    if (eventData.result) {
                        detailContent += `
                            <div class="detail-section">
                                <div class="detail-label">完整结果</div>
                                <pre>${escapeHtml(typeof eventData.result === 'string' ? eventData.result : JSON.stringify(eventData.result, null, 2))}</pre>
                            </div>
                        `;
                    }
                    break;

                case 'error':
                    if (eventData.message) {
                        detailContent += `
                            <div class="detail-section">
                                <div class="detail-label">错误信息</div>
                                <pre>${escapeHtml(eventData.message)}</pre>
                            </div>
                        `;
                    }
                    if (eventData.details) {
                        detailContent += `
                            <div class="detail-section">
                                <div class="detail-label">详细信息</div>
                                <pre>${escapeHtml(typeof eventData.details === 'string' ? eventData.details : JSON.stringify(eventData.details, null, 2))}</pre>
                            </div>
                        `;
                    }
                    break;

                case 'finish':
                    if (eventData.answer) {
                        detailContent += `
                            <div class="detail-section">
                                <div class="detail-label">回答</div>
                                <pre>${escapeHtml(eventData.answer)}</pre>
                            </div>
                        `;
                    }
                    break;

                default:
                    // 显示所有字段
                    detailContent += `
                        <div class="detail-section">
                            <div class="detail-label">原始数据</div>
                            <pre>${escapeHtml(JSON.stringify(event, null, 2))}</pre>
                        </div>
                    `;
            }

            detail.innerHTML = detailContent;
            card.appendChild(detail);

            // 添加到容器
            currentStepsContainer.appendChild(card);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            return card;
        }

        // HTML 转义
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 停止流式请求
        function stopStream() {
            if (abortController) {
                abortController.abort();
                abortController = null;
            }
            isStreaming = false;
            stopBtn.classList.remove('show');
            sendBtn.disabled = false;
            loading.classList.remove('show');

            // 添加停止提示事件
            renderEvent({
                event: 'error',
                data: {
                    message: '用户中断',
                    details: '请求已被用户停止'
                },
                step: -1,
                timestamp: new Date().toISOString()
            });
        }

        // 发送流式消息
        async function sendStreamMessage(message) {
            abortController = new AbortController();
            isStreaming = true;
            stopBtn.classList.add('show');

            const response = await fetch('/api/v1/chat/stream', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message }),
                signal: abortController.signal
            });

            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            try {
                while (isStreaming) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    // 解码并添加到缓冲区
                    buffer += decoder.decode(value, { stream: true });

                    // 尝试解析完整的事件
                    const lines = buffer.split('\n\n');
                    buffer = lines.pop() || ''; // 保留最后一个可能不完整的部分

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const eventData = JSON.parse(line.slice(6));
                                renderEvent(eventData);
                            } catch (e) {
                                console.error('解析事件失败:', e, line);
                            }
                        }
                    }
                }

                // 处理缓冲区中剩余的数据
                if (buffer.trim()) {
                    const lines = buffer.split('\n');
                    let currentData = '';
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            currentData += line.slice(6);
                        }
                    }
                    if (currentData) {
                        try {
                            const eventData = JSON.parse(currentData);
                            renderEvent(eventData);
                        } catch (e) {
                            console.error('解析最后事件失败:', e, currentData);
                        }
                    }
                }
            } finally {
                // 确保释放 reader
                try {
                    await reader.cancel();
                } catch (e) {
                    // 忽略取消错误
                }
            }
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            hideWelcome();
            addMessage(message, true);
            messageInput.value = '';
            sendBtn.disabled = true;
            loading.classList.add('show');

            // 重置步骤容器
            currentStepsContainer = null;

            try {
                await sendStreamMessage(message);
            } catch (error) {
                if (error.name === 'AbortError') {
                    console.log('请求被用户中断');
                } else {
                    console.error('发送消息失败:', error);
                    renderEvent({
                        event: 'error',
                        data: {
                            message: '请求失败',
                            details: error.message
                        }
                    });
                }
            } finally {
                isStreaming = false;
                stopBtn.classList.remove('show');
                sendBtn.disabled = false;
                loading.classList.remove('show');
                messageInput.focus();
                currentStepsContainer = null;
                abortController = null;
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        stopBtn.addEventListener('click', stopStream);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !isStreaming) sendMessage();
        });

        // ========== 状态管理 ==========

        const appState = {
            currentProject: null,
            currentSession: null,
            projects: [],
            sessionCache: {}
        };

        // ========== API 调用封装 ==========

        async function apiCall(method, path, body = null) {
            const options = {
                method,
                headers: { 'Content-Type': 'application/json' }
            };
            if (body) {
                options.body = JSON.stringify(body);
            }

            const response = await fetch(path, options);
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.detail || 'Request failed');
            }
            return response.json();
        }

        // ========== 核心功能函数 ==========

        // 加载项目列表
        async function loadProjects() {
            const projects = await apiCall('GET', '/api/v1/projects');
            appState.projects = projects;
            renderProjectList();

            const lastProjectSlug = localStorage.getItem('last_project_slug');
            if (lastProjectSlug && projects.find(p => p.slug === lastProjectSlug)) {
                await switchProject(lastProjectSlug);
            } else if (projects.length > 0) {
                await switchProject(projects[0].slug);
            }
        }

        // 切换项目
        async function switchProject(projectSlug) {
            const context = await apiCall('PATCH', '/api/v1/agent/context', {
                project_slug: projectSlug
            });

            appState.currentProject = appState.projects.find(p => p.slug === projectSlug);
            appState.currentSession = { id: context.session_id };

            localStorage.setItem('last_project_slug', projectSlug);

            await loadSessions(projectSlug, 1);
            await switchSession(context.session_id);

            renderProjectList();
        }

        // 加载会话列表（分页）
        async function loadSessions(projectSlug, page = 1) {
            const response = await apiCall(
                'GET',
                `/api/v1/sessions?project=${projectSlug}&page=${page}&limit=20`
            );

            const project = appState.projects.find(p => p.slug === projectSlug);
            if (project) {
                if (page === 1) {
                    project.sessions = response.sessions;
                } else {
                    project.sessions = [...project.sessions, ...response.sessions];
                }
                project.totalSessions = response.total;
            }

            renderProjectList();
        }

        // 切换会话
        async function switchSession(sessionId) {
            appState.currentSession = appState.currentProject?.sessions?.find(s => s.id === sessionId);
            if (!appState.currentSession) {
                appState.currentSession = { id: sessionId };
            }

            localStorage.setItem('last_session_id', sessionId);

            chatContainer.innerHTML = '';
            showWelcome();

            renderProjectList();
        }

        // 创建新会话
        async function createSession(projectSlug) {
            const session = await apiCall('POST', '/api/v1/sessions', {
                project_slug: projectSlug
            });

            const project = appState.projects.find(p => p.slug === projectSlug);
            if (project) {
                if (!project.sessions) project.sessions = [];
                project.sessions.unshift(session);
            }

            await switchSession(session.id);
        }

        // 显示欢迎信息（重置欢迎区域）
        function showWelcome() {
            const welcomeDiv = document.createElement('div');
            welcomeDiv.className = 'welcome';
            welcomeDiv.id = 'welcome';
            welcomeDiv.innerHTML = `
                <p>👋 你好！我是 AI 助手</p>
                <p>在下方输入消息开始对话</p>
            `;
            chatContainer.appendChild(welcomeDiv);
        }

        // ========== 渲染函数 ==========

        function renderProjectList() {
            const projectList = document.getElementById('projectList');
            projectList.innerHTML = '';

            appState.projects.forEach(project => {
                const projectItem = document.createElement('div');
                projectItem.className = 'project-item';

                const isActive = appState.currentProject?.slug === project.slug;
                if (isActive) {
                    projectItem.classList.add('expanded');
                }

                const header = document.createElement('div');
                header.className = `project-header ${isActive ? 'active' : ''}`;
                header.innerHTML = `
                    <span class="project-name">${escapeHtml(project.name)}</span>
                    <span class="project-expand">▼</span>
                `;
                header.onclick = () => toggleProject(project.slug);
                projectItem.appendChild(header);

                const sessionList = document.createElement('div');
                sessionList.className = 'session-list';

                if (project.sessions && project.sessions.length > 0) {
                    project.sessions.forEach(session => {
                        const sessionItem = document.createElement('div');
                        sessionItem.className = `session-item ${
                            appState.currentSession?.id === session.id ? 'active' : ''
                        }`;
                        sessionItem.innerHTML = `
                            <span>${escapeHtml(session.title)}</span>
                            <span class="session-actions">
                                <button onclick="event.stopPropagation(); deleteSession('${session.id}')" title="删除">×</button>
                            </span>
                        `;
                        sessionItem.onclick = () => switchSession(session.id);
                        sessionList.appendChild(sessionItem);
                    });
                }

                const createSessionBtn = document.createElement('div');
                createSessionBtn.className = 'session-item';
                createSessionBtn.innerHTML = '+ 新建会话';
                createSessionBtn.style.color = '#888';
                createSessionBtn.onclick = () => createSession(project.slug);
                sessionList.appendChild(createSessionBtn);

                projectItem.appendChild(sessionList);
                projectList.appendChild(projectItem);
            });
        }

        function toggleProject(projectSlug) {
            if (appState.currentProject?.slug !== projectSlug) {
                switchProject(projectSlug);
            } else {
                const projectItem = event.target.closest('.project-item');
                projectItem.classList.toggle('expanded');
            }
        }

        async function deleteSession(sessionId) {
            if (!confirm('确定要删除这个会话吗？')) return;

            await apiCall('DELETE', `/api/v1/sessions/${sessionId}`);

            appState.projects.forEach(project => {
                if (project.sessions) {
                    project.sessions = project.sessions.filter(s => s.id !== sessionId);
                }
            });

            if (appState.currentSession?.id === sessionId) {
                const firstSession = appState.currentProject?.sessions?.[0];
                if (firstSession) {
                    await switchSession(firstSession.id);
                }
            }

            renderProjectList();
        }

        // ========== 权限对话框按钮绑定 ==========
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('permissionAllowOnce').onclick = () => handlePermissionDecision('allow_once');
            document.getElementById('permissionDeny').onclick = () => handlePermissionDecision('deny');
        });

        // ========== 应用初始化 ==========

        // ========== 权限对话框管理 ==========
        let pendingPermissionRequest = null;

        function checkPermissionError(event) {
            if (event.event === 'error' && event.data?.code === 'PERMISSION_REQUIRED') {
                showPermissionDialog(event.data);
                return true;
            }
            return false;
        }

        function showPermissionDialog(permissionData) {
            pendingPermissionRequest = permissionData;
            const message = `Agent 想要访问项目外的文件：\n${permissionData.path}`;
            document.getElementById('permissionMessage').textContent = message;
            document.getElementById('permissionModal').classList.add('show');
        }

        function closePermissionDialog() {
            document.getElementById('permissionModal').classList.remove('show');
            pendingPermissionRequest = null;
        }

        async function handlePermissionDecision(decision) {
            if (!pendingPermissionRequest) return;

            const { path, operation } = pendingPermissionRequest;

            // 暂时不调用后端 API，直接关闭对话框
            console.log('用户选择:', decision, '路径:', path, '操作:', operation);
            closePermissionDialog();
        }

        // ========== 应用初始化 ==========

        async function init() {
            try {
                await loadProjects();
            } catch (error) {
                console.error('初始化失败:', error);
                alert('加载项目列表失败：' + error.message);
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
