<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent - 聊天助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #16213e;
            padding: 15px 20px;
            border-bottom: 1px solid #0f3460;
        }
        .header h1 {
            font-size: 18px;
            color: #e94560;
        }
        .header span {
            font-size: 12px;
            color: #888;
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .message {
            margin-bottom: 15px;
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user { justify-content: flex-end; }
        .message.assistant { justify-content: flex-start; }
        .bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
        }
        .message.user .bubble {
            background: #e94560;
            color: #fff;
        }
        .message.assistant .bubble {
            background: #0f3460;
            color: #eee;
        }
        .input-area {
            background: #16213e;
            padding: 15px 20px;
            border-top: 1px solid #0f3460;
            display: flex;
            gap: 10px;
        }
        #messageInput {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #0f3460;
            border-radius: 8px;
            background: #1a1a2e;
            color: #eee;
            font-size: 14px;
            outline: none;
        }
        #messageInput:focus { border-color: #e94560; }
        #sendBtn {
            padding: 12px 24px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        #sendBtn:disabled { background: #555; cursor: not-allowed; }
        .loading {
            display: none;
            color: #888;
            font-size: 12px;
            line-height: 40px;
        }
        .loading.show { display: block; }
        .welcome {
            text-align: center;
            color: #888;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 AI Agent</h1>
        <span>基于 LangGraph + DeepSeek</span>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="welcome" id="welcome">
            <p>👋 你好！我是 AI 助手</p>
            <p>在下方输入消息开始对话</p>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="messageInput" placeholder="输入消息..." autofocus>
        <button id="sendBtn">发送</button>
        <span class="loading" id="loading">AI 思考中...</span>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const loading = document.getElementById('loading');
        const welcome = document.getElementById('welcome');

        function hideWelcome() {
            if (welcome) welcome.style.display = 'none';
        }

        function addMessage(content, isUser) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'assistant'}`;
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = content;
            messageDiv.appendChild(bubble);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;
            hideWelcome();
            addMessage(message, true);
            messageInput.value = '';
            sendBtn.disabled = true;
            loading.classList.add('show');
            try {
                const response = await fetch('/api/v1/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                if (!response.ok) throw new Error('请求失败');
                const data = await response.json();
                addMessage(data.response, false);
            } catch (error) {
                addMessage('❌ 发生错误，请重试', false);
            } finally {
                sendBtn.disabled = false;
                loading.classList.remove('show');
                messageInput.focus();
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
